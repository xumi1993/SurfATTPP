name: Build on macOS and Linux

on:
  push:
    branches: [ devel ]
  pull_request:
    branches: [ main, devel ]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies with Homebrew
        run: |
          brew update
          brew install cmake open-mpi hdf5 eigen yaml-cpp spdlog gcc

      - name: Create build directory
        run: mkdir -p build

      - name: Configure CMake
        working-directory: build
        run: |
          FC=$(ls /opt/homebrew/bin/gfortran-* 2>/dev/null | sort -V | tail -1)
          echo "Using Fortran compiler: $FC"
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_Fortran_COMPILER="$FC" ..

      - name: Build
        working-directory: build
        run: make -j$(sysctl -n hw.ncpu)

    #   - name: Run tests
    #     working-directory: build
    #     run: |
    #       cmake -DBUILD_TESTS=ON ..
    #       make -j$(sysctl -n hw.ncpu)
    #       ctest --output-on-failure

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ubuntu-version: 22.04

    container:
      image: ubuntu:${{ matrix.ubuntu-version }}

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git curl

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: build-env

      - name: Install dependencies with Mamba
        shell: bash -l {0}
        run: |
          mamba install -y -c conda-forge \
            cmake \
            make \
            openmpi \
            hdf5 \
            eigen \
            yaml-cpp \
            fortran-compiler \
            cxx-compiler \
            zlib \
            spdlog

      - name: Create build directory
        shell: bash -l {0}
        run: mkdir -p build

      - name: Configure CMake
        shell: bash -l {0}
        working-directory: build
        run: cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        shell: bash -l {0}
        working-directory: build
        run: make -j$(nproc)

    #   - name: Run tests
    #     shell: bash -l {0}
    #     working-directory: build
    #     run: |
    #       cmake -DBUILD_TESTS=ON ..
    #       make -j$(nproc)
    #       ctest --output-on-failure
